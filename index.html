<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeCode | Konkurs</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cursor-moon"></div>
    <canvas id="bg-canvas"></canvas>
    <div class="glow-bg"></div>

    <div class="container" id="mainContainer">
        <header>
            <p class="subtitle">KONKURS DLA SPOLECZNOSCI</p>
            <h1>PRIMECODE</h1>
            <p class="prize-info">3 x 10 PLN NA DEVSTORE + DARMOWY PLUGIN</p>
        </header>

        <div id="countdown">
            <div class="time-box"><span id="days">00</span><span class="label">DNI</span></div>
            <div class="time-box"><span id="hours">00</span><span class="label">GODZ</span></div>
            <div class="time-box"><span id="minutes">00</span><span class="label">MIN</span></div>
            <div class="time-box"><span id="seconds">00</span><span class="label">SEK</span></div>
        </div>

        <form id="entryForm">
            <div class="input-group">
                <input type="text" id="discordNick" placeholder="Wprowadź swój nick Discord" required autocomplete="off">
            </div>
            <button type="submit" id="submitBtn">ZGŁOŚ UDZIAŁ</button>
        </form>

        <div id="statusContainer" style="display:none;">
            <h2 id="statusTitle">Zgłaszanie...</h2>
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-bar-fill"></div>
            </div>
            <p id="statusStep">Pobieranie danych...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqNRQ_69RR8QF-n8uUAuJrZtbHAEoH7KY",
            authDomain: "primecode-konkurs.firebaseapp.com",
            databaseURL: "https://primecode-konkurs-default-rtdb.firebaseio.com",
            projectId: "primecode-konkurs",
            storageBucket: "primecode-konkurs.firebasestorage.app",
            messagingSenderId: "425917535443",
            appId: "1:425917535443:web:b77ac0dcad2807b8b67026"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const targetDate = new Date("2026-04-16T19:00:00").getTime();

        // Zabezpieczenie przy ładowaniu strony
        window.addEventListener('load', () => {
            if (localStorage.getItem('alreadyRegistered')) {
                document.getElementById('entryForm').style.display = 'none';
                document.getElementById('statusContainer').style.display = 'block';
                document.getElementById('statusContainer').innerHTML = "<h1>ZAPISANO</h1><p class='prize-info'>JESTEŚ JUŻ NA LIŚCIE. OCZEKUJ NA WYNIKI.</p>";
            }
        });

        // 1. Licznik
        const timer = setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;
            if (distance < 0) {
                clearInterval(timer);
                checkWinners();
                return;
            }
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }, 1000);

        // 2. Zapisywanie z profesjonalnym loaderem
        document.getElementById('entryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const entryForm = document.getElementById('entryForm');
            const statusContainer = document.getElementById('statusContainer');
            const progressBar = document.getElementById('progressBar');
            const statusStep = document.getElementById('statusStep');

            entryForm.style.display = 'none';
            statusContainer.style.display = 'block';

            const steps = ["Inicjalizacja...", "Pobieranie nicku...", "Zapisywanie w bazie...", "Dołączanie do konkursu..."];
            for (let i = 0; i < steps.length; i++) {
                statusStep.innerText = steps[i];
                progressBar.style.width = ((i + 1) * 25) + "%";
                await new Promise(r => setTimeout(r, 600));
            }

            const nick = document.getElementById('discordNick').value;
            push(ref(db, 'users/'), { nick: nick, timestamp: Date.now() }).then(() => {
                localStorage.setItem('alreadyRegistered', 'true');
                statusContainer.innerHTML = "<h1>ZAPISANO</h1><p class='prize-info'>OCZEKUJ NA WYNIKI</p>";
            });
        });

        function checkWinners() {
            get(ref(db, 'users/')).then((snapshot) => {
                if (snapshot.exists()) {
                    const data = Object.values(snapshot.val());
                    const winners = data.sort(() => 0.5 - Math.random()).slice(0, 3).map(u => u.nick);
                    document.getElementById('mainContainer').innerHTML = `<h1>ZWYCIĘZCY</h1><p>${winners.join(', ')}</p>`;
                }
            });
        }
        if (Date.now() >= targetDate) checkWinners();
    </script>
    <script src="script.js"></script>
</body>
</html>
