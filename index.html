<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeCode | Konkurs</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="glow-bg"></div>

    <div class="container" id="mainContainer">
        <header>
            <p class="subtitle">KONKURS DLA SPOLECZNOSCI</p>
            <h1>PRIMECODE</h1>
            <p class="prize-info">3 x 10 PLN NA DEVSTORE + DARMOWY PLUGIN</p>
        </header>

        <div id="countdown">
            <div class="time-box"><span id="days">00</span><span class="label">DNI</span></div>
            <div class="time-box"><span id="hours">00</span><span class="label">GODZ</span></div>
            <div class="time-box"><span id="minutes">00</span><span class="label">MIN</span></div>
            <div class="time-box"><span id="seconds">00</span><span class="label">SEK</span></div>
        </div>

        <form id="entryForm">
            <div class="input-group">
                <input type="text" id="discordNick" placeholder="Wprowadź swój nick Discord" required autocomplete="off">
            </div>
            <button type="submit" id="submitBtn">ZGŁOŚ UDZIAŁ</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqNRQ_69RR8QF-n8uUAuJrZtbHAEoH7KY",
            authDomain: "primecode-konkurs.firebaseapp.com",
            databaseURL: "https://primecode-konkurs-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "primecode-konkurs",
            storageBucket: "primecode-konkurs.firebasestorage.app",
            messagingSenderId: "425917535443",
            appId: "1:425917535443:web:b77ac0dcad2807b8b67026"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const targetDate = new Date("2026-04-16T19:00:00").getTime();
        const mainContainer = document.getElementById('mainContainer');

        // Funkcja sprawdzająca status zgłoszenia
        function checkRegistrationStatus() {
            if (localStorage.getItem('alreadyRegistered')) {
                mainContainer.innerHTML = "<h1>ZAPISANO</h1><p class='prize-info'>JESTEŚ JUŻ NA LIŚCIE. OCZEKUJ NA WYNIKI.</p>";
                return true;
            }
            return false;
        }

        // 1. Licznik
        const timer = setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;
            if (distance < 0) {
                clearInterval(timer);
                checkWinners();
                return;
            }
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }, 1000);

        // 2. Zapisywanie
        document.getElementById('entryForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if (checkRegistrationStatus()) return;

            const nick = document.getElementById('discordNick').value;
            push(ref(db, 'users/'), { nick: nick, timestamp: Date.now() }).then(() => {
                localStorage.setItem('alreadyRegistered', 'true');
                mainContainer.innerHTML = "<h1>ZAPISANO</h1><p class='prize-info'>OCZEKUJ NA WYNIKI</p>";
            });
        });

        // 3. Sprawdzanie zwycięzców
        function checkWinners() {
            get(ref(db, 'users/')).then((snapshot) => {
                if (snapshot.exists()) {
                    const data = Object.values(snapshot.val());
                    const winners = data.sort(() => 0.5 - Math.random()).slice(0, 3).map(u => u.nick);
                    mainContainer.innerHTML = `<h1>ZWYCIĘZCY</h1><p>${winners.join(', ')}</p>`;
                }
            });
        }

        // Sprawdź status przy starcie
        if (!checkRegistrationStatus() && Date.now() >= targetDate) {
            checkWinners();
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
