<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeCode | Konkurs</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="glow-bg"></div>

    <div class="container" id="mainContainer">
        <header>
            <p class="subtitle">KONKURS DLA SPOLECZNOSCI</p>
            <h1>PRIMECODE</h1>
            <p class="prize-info">3 x 10 PLN NA DEVSTORE + DARMOWY PLUGIN</p>
        </header>

        <div id="countdown">
            <div class="time-box"><span id="days">00</span><span class="label">DNI</span></div>
            <div class="time-box"><span id="hours">00</span><span class="label">GODZ</span></div>
            <div class="time-box"><span id="minutes">00</span><span class="label">MIN</span></div>
            <div class="time-box"><span id="seconds">00</span><span class="label">SEK</span></div>
        </div>

        <form id="entryForm">
            <div class="input-group">
                <input type="text" id="discordNick" placeholder="Wprowadź swój nick Discord" required autocomplete="off">
            </div>
            <button type="submit" id="submitBtn">ZGŁOŚ UDZIAŁ</button>
        </form>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAqNRQ_69RR8QF-n8uUAuJrZtbHAEoH7KY",
        authDomain: "primecode-konkurs.firebaseapp.com",
        databaseURL: "https://primecode-konkurs-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "primecode-konkurs",
        storageBucket: "primecode-konkurs.firebasestorage.app",
        messagingSenderId: "425917535443",
        appId: "1:425917535443:web:b77ac0dcad2807b8b67026"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const form = document.getElementById('entryForm');
    
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        console.log("Przycisk kliknięty!"); // SPRAWDŹ CZY TO SIĘ POJAWIA W KONSOLI

        const nickInput = document.getElementById('discordNick');
        const nick = nickInput ? nickInput.value : null;

        if (!nick) {
            console.error("Błąd: Pole nick jest puste!");
            return;
        }

        console.log("Wysyłanie nicku:", nick);

        push(ref(db, 'users/'), { 
            nick: nick, 
            timestamp: Date.now() 
        }).then(() => {
            console.log("Zapisano pomyślnie w Firebase!");
            localStorage.setItem('alreadyRegistered', 'true');
            document.querySelector('.container').innerHTML = "<h1>ZAPISANO</h1>";
        }).catch((err) => {
            console.error("Błąd Firebase:", err); // TO POKAŻE CO JEST NIE TAK
            alert("Błąd: " + err.message);
        });
    });
</script>
    <script src="script.js"></script>
</body>
</html>
